[gcode_macro PRINT_START]
gcode:
  # Fetch parameters from slicer
  {% set t0_start = params.TOOL_0_START %}
  {% set t1_start = params.TOOL_1_START %}
  {% set t2_start = params.TOOL_2_START %}
  {% set t3_start = params.TOOL_3_START %}
  {% set bed_temp = params.BED %}
  {% set target_bed = params.BED %}
  {% set t0_used = params.IST0|upper %}
  {% set t1_used = params.IST1|upper %}
  {% set t2_used = params.IST2|upper %}
  {% set t3_used = params.IST3|upper %}
  {% set target_chamber = params.CHAMBER|default("45")|int %}
  {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}
  
  # Convert to boolean (handles "TRUE", "1", or 1 from slicer)
  {% set t0_used = (t0_used == "TRUE" or t0_used == "1") %}
  {% set t1_used = (t1_used == "TRUE" or t1_used == "1") %}
  {% set t2_used = (t2_used == "TRUE" or t2_used == "1") %}
  {% set t3_used = (t3_used == "TRUE" or t3_used == "1") %}

  M104 S150 T0 # Start with T0 at 150c for probing
  
  # Home the printer
  G28
  G90

  # Clear old bed mesh
  BED_MESH_CLEAR

  # Check if the bed temp is higher than 90c - if so then trigger a heatsoak
  {% if params.BED|int > 90 %}
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"
    M106 S255  # PT-fan on
    G1 X{x_wait} Y{y_wait} Z15 F9000
    M190 S{target_bed}
    SET_DISPLAY_TEXT MSG="Heatsoak: {target_chamber}c"
    TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={target_chamber}
  # If the bed temp is not over 90c, then skip the heatsoak and just heat up to set temp with a 5 min soak
  {% else %}
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"
    G1 X{x_wait} Y{y_wait} Z15 F9000
    M190 S{target_bed}
    SET_DISPLAY_TEXT MSG="Soak for 5 min"
    G4 P30000
  {% endif %}

  # Heat hotend to 150c - T0-T2 can heat together, T3 waits to avoid PSU overload
  SET_DISPLAY_TEXT MSG="Hotend: 150c"
  M104 S150 T0
  {% if t1_used %}
    M104 S150 T1
  {% endif %}
  {% if t2_used %}
    M104 S150 T2
  {% endif %}
  
  # Wait for T0-T2 to finish heating before starting T3
  {% if t3_used %}
    M109 S150 T0  # Wait for T0
    {% if t1_used %}
      M109 S150 T1  # Wait for T1
    {% endif %}
    {% if t2_used %}
      M109 S150 T2  # Wait for T2
    {% endif %}
    M109 S150 T3  # Now heat T3
  {% endif %}

  # Z-Tilt Adjust
  SET_DISPLAY_TEXT MSG="Z-Tilt Adjust"
  Z_TILT_ADJUST
  M400
  G28 Z

  # Bed mesh
  SET_DISPLAY_TEXT MSG="Adaptive Bed Mesh"
  BED_MESH_CALIBRATE ADAPTIVE=1
  
  # Tool Check for Cartographer Touch
  T0
  #CARTOGRAPHER_TOUCH_HOME

  # Set final temps but don't wait - PRIME_LINES will heat each tool sequentially
  SET_DISPLAY_TEXT MSG="Setting print temps"
  G1 X{x_wait} Y{y_wait} Z15 F9000
  M107
  
  # Start heating T0-T2 together (non-blocking)
  {% if t0_used %}
    M104 S{t0_start} T0
  {% else %}
    M104 S0 T0
  {% endif %}
  
  {% if t1_used %}
    M104 S{t1_start} T1
  {% else %}
    M104 S0 T1
  {% endif %}
  
  {% if t2_used %}
    M104 S{t2_start} T2
  {% else %}
    M104 S0 T2
  {% endif %}
  
  # If T3 is used, wait for others first, then heat T3
  {% if t3_used %}
    {% if t0_used %}
      M109 S{t0_start} T0  # Wait for T0
    {% endif %}
    {% if t1_used %}
      M109 S{t1_start} T1  # Wait for T1
    {% endif %}
    {% if t2_used %}
      M109 S{t2_start} T2  # Wait for T2
    {% endif %}
    M104 S{t3_start} T3  # Now start T3
  {% else %}
    M104 S0 T3
  {% endif %}

  # Priming - use PRIME_LINES macro to prime all hot tools (waits for temp sequentially)
  SET_DISPLAY_TEXT MSG="Priming"
 # SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=0  # ← Disable filament sensor to stop false positives during purge
  PRIME_LINES INITIAL_TOOL={params.INITIAL_TOOL|int}
 # SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=1  # ← re-enable sensor
  SET_DISPLAY_TEXT MSG="Printing"
