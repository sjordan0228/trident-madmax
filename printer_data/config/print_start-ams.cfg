[gcode_macro PRINT_START]
gcode:
  # Fetch parameters from slicer
  {% set t0_start = params.TOOL_0_START|default(220)|float %}
  {% set t1_start = params.TOOL_1_START|default(220)|float %}
  {% set t2_start = params.TOOL_2_START|default(220)|float %}
  {% set t3_start = params.TOOL_3_START|default(220)|float %}
  {% set t4_start = params.TOOL_4_START|default(t0_start)|float %}
  {% set t5_start = params.TOOL_5_START|default(t0_start)|float %}
  {% set t6_start = params.TOOL_6_START|default(t0_start)|float %}
  {% set t7_start = params.TOOL_7_START|default(t0_start)|float %}

  {% set target_bed = params.BED|default(60)|float %}
  {% set target_chamber = params.CHAMBER|default(45)|int %}
  {% set initial_tool = params.INITIAL_TOOL|default(0)|int %}

  {% set t0_used = params.IST0|default("FALSE")|upper %}
  {% set t1_used = params.IST1|default("FALSE")|upper %}
  {% set t2_used = params.IST2|default("FALSE")|upper %}
  {% set t3_used = params.IST3|default("FALSE")|upper %}
  {% set t4_used = params.IST4|default("FALSE")|upper %}
  {% set t5_used = params.IST5|default("FALSE")|upper %}
  {% set t6_used = params.IST6|default("FALSE")|upper %}
  {% set t7_used = params.IST7|default("FALSE")|upper %}

  # Convert to boolean
  {% set t0_used = (t0_used == "TRUE" or t0_used == "1") %}
  {% set t1_used = (t1_used == "TRUE" or t1_used == "1") %}
  {% set t2_used = (t2_used == "TRUE" or t2_used == "1") %}
  {% set t3_used = (t3_used == "TRUE" or t3_used == "1") %}
  {% set t4_used = (t4_used == "TRUE" or t4_used == "1") %}
  {% set t5_used = (t5_used == "TRUE" or t5_used == "1") %}
  {% set t6_used = (t6_used == "TRUE" or t6_used == "1") %}
  {% set t7_used = (t7_used == "TRUE" or t7_used == "1") %}

  {% set ams_used = t4_used or t5_used or t6_used or t7_used %}
  {% set t0_heat_used = t0_used or ams_used %}

  {% if initial_tool == 4 %}
    {% set t0_final = t4_start %}
  {% elif initial_tool == 5 %}
    {% set t0_final = t5_start %}
  {% elif initial_tool == 6 %}
    {% set t0_final = t6_start %}
  {% elif initial_tool == 7 %}
    {% set t0_final = t7_start %}
  {% else %}
    {% set t0_final = t0_start %}
  {% endif %}

  {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

  # Start with Toolhead0 heater at 150C for probing / mesh
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET=150

  # Home the printer
  G28
  G90

  # Clear old bed mesh
  BED_MESH_CLEAR

  # Bed heat / soak
  {% if target_bed|int > 90 %}
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"
    M106 S255
    G1 X{x_wait} Y{y_wait} Z15 F9000
    M190 S{target_bed}
    SET_DISPLAY_TEXT MSG="Heatsoak: {target_chamber}c"
    TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={target_chamber}
  {% else %}
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"
    G1 X{x_wait} Y{y_wait} Z15 F9000
    M190 S{target_bed}
    SET_DISPLAY_TEXT MSG="Soak for 30s"
    G4 P30000
  {% endif %}

  # Heat hotends to 150C for probing
  # T0-T2 together, T3 delayed to avoid PSU overload
  SET_DISPLAY_TEXT MSG="Hotend: 150c"
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET=150
  {% if t1_used %}
    SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET=150
  {% endif %}
  {% if t2_used %}
    SET_HEATER_TEMPERATURE HEATER=extruder2 TARGET=150
  {% endif %}

  {% if t3_used %}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=145 MAXIMUM=155
    {% if t1_used %}
      TEMPERATURE_WAIT SENSOR=extruder1 MINIMUM=145 MAXIMUM=155
    {% endif %}
    {% if t2_used %}
      TEMPERATURE_WAIT SENSOR=extruder2 MINIMUM=145 MAXIMUM=155
    {% endif %}
    SET_HEATER_TEMPERATURE HEATER=extruder3 TARGET=150
    TEMPERATURE_WAIT SENSOR=extruder3 MINIMUM=145 MAXIMUM=155
  {% endif %}

  # Z-Tilt Adjust
  SET_DISPLAY_TEXT MSG="Z-Tilt Adjust"
  Z_TILT_ADJUST
  M400
  G28 Z

  # Bed mesh
  SET_DISPLAY_TEXT MSG="Adaptive Bed Mesh"
  BED_MESH_CALIBRATE ADAPTIVE=1

  # Probe / touch with Toolhead0
  T0
  # CARTOGRAPHER_TOUCH_HOME

  # Set final temps
  SET_DISPLAY_TEXT MSG="Setting print temps"
  G1 X{x_wait} Y{y_wait} Z15 F9000
  M107

  {% if t0_heat_used %}
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={t0_final}
  {% else %}
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
  {% endif %}

  {% if t1_used %}
    SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET={t1_start}
  {% else %}
    SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET=0
  {% endif %}

  {% if t2_used %}
    SET_HEATER_TEMPERATURE HEATER=extruder2 TARGET={t2_start}
  {% else %}
    SET_HEATER_TEMPERATURE HEATER=extruder2 TARGET=0
  {% endif %}

  {% if t3_used %}
    {% if t0_heat_used %}
      TEMPERATURE_WAIT SENSOR=extruder MINIMUM={t0_final - 2} MAXIMUM={t0_final + 5}
    {% endif %}
    {% if t1_used %}
      TEMPERATURE_WAIT SENSOR=extruder1 MINIMUM={t1_start - 2} MAXIMUM={t1_start + 5}
    {% endif %}
    {% if t2_used %}
      TEMPERATURE_WAIT SENSOR=extruder2 MINIMUM={t2_start - 2} MAXIMUM={t2_start + 5}
    {% endif %}
    SET_HEATER_TEMPERATURE HEATER=extruder3 TARGET={t3_start}
  {% else %}
    SET_HEATER_TEMPERATURE HEATER=extruder3 TARGET=0
  {% endif %}

  # Select the initial tool / lane
  T{initial_tool}

  # Wait for the initial tool's active heater only
  {% if initial_tool == 0 or initial_tool == 4 or initial_tool == 5 or initial_tool == 6 or initial_tool == 7 %}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={t0_final - 2} MAXIMUM={t0_final + 5}
  {% elif initial_tool == 1 %}
    TEMPERATURE_WAIT SENSOR=extruder1 MINIMUM={t1_start - 2} MAXIMUM={t1_start + 5}
  {% elif initial_tool == 2 %}
    TEMPERATURE_WAIT SENSOR=extruder2 MINIMUM={t2_start - 2} MAXIMUM={t2_start + 5}
  {% elif initial_tool == 3 %}
    TEMPERATURE_WAIT SENSOR=extruder3 MINIMUM={t3_start - 2} MAXIMUM={t3_start + 5}
  {% endif %}

  # Priming
  SET_DISPLAY_TEXT MSG="Priming"

  # Physical toolchanger print
  {% if initial_tool <= 3 %}
    PRIME_LINES INITIAL_TOOL={initial_tool}
  {% else %}
    # AMS on Toolhead0
    # Replace BT_PURGE with your actual BoxTurtle purge macro if needed
    BT_PURGE
  {% endif %}

  SET_DISPLAY_TEXT MSG="Printing"