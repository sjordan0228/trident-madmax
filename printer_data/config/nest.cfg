[mcu nest]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_2C0034000A50323756343420-if00
# Edit with the serial of Birds' Nest. Use ls /dev/serial/by-id/* to find it.

#[filament_switch_sensor FS1]
#switch_pin: ^nest:PB9


[filament_motion_sensor encoder_sensor]
switch_pin: ^nest:PB9 # motion sensor IO is PC2
detection_length: 15 # accuracy of motion sensor 2.88mm
extruder: extruder
pause_on_runout: True
runout_gcode:
 PAUSE # [pause_resume] is required in printer.cfg
 M117 Filament encoder runout
insert_gcode:
 M117 Filament encoder inserted
 
[filament_switch_sensor FS2]
switch_pin: ^nest:PB8

[filament_switch_sensor FS3]
switch_pin: ^nest:PB7

[filament_switch_sensor FS4]
switch_pin: ^nest:PB6

[filament_switch_sensor FS5]
switch_pin: ^nest:PB5

[filament_switch_sensor FS6]
switch_pin: ^nest:PB4

