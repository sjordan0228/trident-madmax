[temperature_sensor Birds_Nest_Temp]
sensor_type: temperature_mcu
sensor_mcu: nest
min_temp: 0
max_temp: 100

[neopixel NEO1]
pin: nest:PD3
color_order: GRBW

[neopixel NEO2]
pin: nest:PB3
color_order: GRBW