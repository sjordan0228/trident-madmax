### AutoTune
[autotune_tmc stepper_x]
motor: ldo-42sth48-2004mah
sgt: 0
voltage: 48
[autotune_tmc stepper_y]
motor: ldo-42sth48-2004mah
sgt: 0
voltage: 48
[autotune_tmc stepper_z]
motor: ldo-42sth40-1684cl350et
#voltage: 48
[autotune_tmc stepper_z1]
motor: ldo-42sth40-1684cl350et
#voltage: 48
[autotune_tmc stepper_z2]
motor: ldo-42sth40-1684cl350et
#voltage: 48
#[autotune_tmc extruder]
#motor : ldo-36sth20-1004ahg
#tuning_goal: performance
#voltage: 24

## X Stepper on Motor1(B Motor)
[stepper_x]
step_pin: PB10
dir_pin: !PB11
enable_pin: !PG0
microsteps: 32
rotation_distance: 40
full_steps_per_rotation:400
endstop_pin: !toolboard_0:gpio3
#endstop_pin: PF4
position_min: 3
position_endstop: 300
position_max: 300


homing_speed: 40  
second_homing_speed: 10
homing_retract_dist: 5
homing_positive_dir: true

[tmc5160 stepper_x]
cs_pin: PE15
spi_bus: spi4
diag0_pin: ^!PG1
interpolate: true #was true
run_current: 1.4
hold_current: 0.84
sense_resistor: 0.075

[stepper_y]
step_pin: PF15
dir_pin: !PF14
enable_pin: !PE9
rotation_distance: 40
microsteps: 32
full_steps_per_rotation:400  #set to 200 for 1.8 degree stepper
endstop_pin: !PC2
position_min: -10
position_endstop: 300
position_max: 300
homing_speed: 50  #Max 100
second_homing_speed: 10
homing_retract_dist: 5
homing_positive_dir: true

[tmc5160 stepper_y]
cs_pin: PE11
spi_bus: spi4
diag0_pin: ^!PE10
interpolate: true
run_current: 1.4
hold_current: 0.84
sense_resistor: 0.075

