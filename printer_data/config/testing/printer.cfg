[mcu]
##--------------------------------------------------------------------
canbus_uuid:b118fd99047b
##--------------------------------------------------------------------


[mcu toolboard_0]
serial: /dev/serial/by-id/usb-Klipper_rp2040_31363131320347F0-if00
restart_method: command

[mcu toolboard_1]
serial: /dev/serial/by-id/usb-Klipper_rp2040_31363131320281C4-if00
restart_method: command 

[printer]
kinematics: corexy
max_velocity: 700
max_accel: 14000  			
max_z_velocity: 15 			
max_z_accel: 350
square_corner_velocity: 5.0

[save_variables]
filename: ~/printer_data/config/klipper-toolchanger/offset_save_file.cfg


[temperature_sensor MCU]
sensor_type: temperature_mcu

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 115

[temperature_sensor chamber]
## Chamber Temperature - T1
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA1
pullup_resistor: 2200
min_temp: 0
max_temp: 100
gcode_id: chamber_th

#[temperature_sensor SoC]
#sensor_type: temperature_host
########################################
# EXP1 / EXP2 (display) pins
########################################

[input_shaper]
shaper_freq_x: 60.4
shaper_type_x: mzv
shaper_freq_y: 45.6
shaper_type_y: mzv
damping_ratio_x: 0.070
damping_ratio_y: 0.071

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PG9, EXP1_2=PG12,
    EXP1_3=PG13, EXP1_4=PG14,
    EXP1_5=PC13, EXP1_6=PC14,    # Slot in the socket on this side
    EXP1_7=PC15, EXP1_8=PF0,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PA6, EXP2_2=PA5,
    EXP2_3=PE2, EXP2_4=PE4,
    EXP2_5=PE3, EXP2_6=PA7,      # Slot in the socket on this side
    EXP2_7=PE5, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=PE4
