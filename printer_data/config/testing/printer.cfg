dir_pin: PC11
enable_pin: !PD2

rotation_distance: 4
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PD0
interpolate: true
run_current: 1.2
hold_current: 0.65
sense_resistor: 0.110
#stealthchop_threshold: 0

##	Z2 Stepper - Front Right on Motor6 
[stepper_z2]
step_pin: PC9
dir_pin: PC8
enable_pin: !PC10

rotation_distance: 4
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PA8
#diag_pin: ^!PA15
interpolate: true
run_current: 1.2
hold_current: 0.65
sense_resistor: 0.110
#stealthchop_threshold: 0

