dir_pin: PD3
enable_pin: !PD7

rotation_distance: 4
microsteps: 32

endstop_pin:probe:z_virtual_endstop
position_max: 280
position_min: -5
homing_speed: 8.0 
second_homing_speed: 3
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PD5
#diag_pin: ^!PD6
interpolate: true
run_current: 1.2
hold_current: 0.65
sense_resistor: 0.110
#stealthchop_threshold: 0

##	Z1 Stepper - Rear  on Motor5 
[stepper_z1]
