# This file stores the flash_commands for each mcus
# Previous version KCONFIG_CONFIG was needed now it is automaticly added when make flash is called
# version : 0.1
# tested/supported flash methods :
#  - make flash
#  - sdcard_flash
#  - flashtool.py
#  - mount/cp/umount (for rp2040)

[manta m8p]
klipper_section: mcu
quiet_command: ~/klippy-env/bin/python3 ~/katapult/scripts/flashtool.py -i can0 -r -u 6eadd218a90b; sleep 2
action_command: ~/klippy-env/bin/python3 ~/katapult/scripts/flashtool.py -d /dev/serial/by-id/usb-katapult_stm32h723xx_0E003A000551313433343333-if00  

[toolboard_0]
klipper_section: mcu toolboard_0
action_command: ~/klippy-env/bin/python3 ~/katapult/scripts/flashtool.py -u 5255b7b9b759

[toolboard_1]
klipper_section: mcu toolboard_1
action_command: ~/klippy-env/bin/python3 ~/katapult/scripts/flashtool.py -u 9a2f30fca958
