#####################################################################
#   Temperature Sensor
#####################################################################

[temperature_sensor toolboard_2]
sensor_type: temperature_mcu
sensor_mcu: toolboard_2
min_temp: 0
max_temp: 115

#####################################################################
#   gcode_macro T0
#####################################################################
[gcode_macro T2]
variable_color: ""
variable_tool_number: 2
variable_spool_id: None
gcode:
  _CHANGE_TOOL T={tool_number}
  {% if spool_id != None %}
    SET_ACTIVE_SPOOL ID={spool_id}
  {% endif %}
  

[tool T2]
tool_number: 2
extruder: extruder2
fan: part_fan_t2
gcode_x_offset: 0
gcode_y_offset: 0
gcode_z_offset: 0
# Position with the toolhead aligned with the dock
params_park_x: 212
params_detach_x: 202
params_input_shaper_type_x: 'mzv'
params_input_shaper_freq_x: 60.4
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_y: 45.6

