[gcode_macro _CHANGE_TOOL]
description: Changes tools, updates offsets and transfers fan control to the next tool head.
  If tool head LEDs are defined, will set READY, BUSY, or PRINTING.
  Usage: _CHANGE_TOOL T={tool_number}
gcode:
  {% set tool_number = params.T|int %}
  {% set svf = printer.save_variables.variables %}
  {% set modified_z = 0.0 %}
  {% set last_tool = printer.toolchanger.tool_number|int %}
  # Save the current Z coordinate before tool change
  {% set saved_z_coord = printer.gcode_move.gcode_position.z|float %}
  
  {% if last_tool|int >= 0 %}
    # Grab the current tool number so we can remove any z offset that is present
    {% set z_offset_val = svf[ 't' + printer.toolchanger.tool_number|string + '_offset_z'] %}
    # Subtract the tool z_offset from the homing_origin, the remainder is any tweaked z offset
    {% set modified_z = printer.gcode_move.homing_origin.z|float|round(3) - z_offset_val|float|round(3) %}
    # Grab the current print fan speed
    {% set active_fan = "fan_generic part_fan_t" + printer.toolchanger.tool_number|string %}
    {% set fan_speed = printer[active_fan].speed|float|round(2) %}
    # Shutdown the active part cooling fan
    SET_FAN_SPEED FAN="part_fan_t{printer.toolchanger.tool_number|string}" SPEED=0
    # Clear the offsets set by macros...changed move=1 to move=0
    SET_GCODE_OFFSET X=0 Y=0 Z=0 MOVE=0
    # Update toolhead lights if applicable
    {% if printer["gcode_macro _sb_vars"] is defined %}
      STATUS_READY
    {% endif %}
  {% endif %}
  # Activate the selected tool
  SELECT_TOOL T={tool_number}
  # FIXED: Changed MOVE=1 to MOVE=0 - Apply the macro offsets in coordinate system only
  SET_GCODE_OFFSET X={svf[ 't' + tool_number|string + '_offset_x']|float|round(3)} Y={svf[ 't' + tool_number|string + '_offset_y']|float|round(3)} Z={svf[ 't' + tool_number|string + '_offset_z']|float + modified_z|float|round(3)} MOVE=0
  # ADDED: Restore to the correct Z coordinate after applying offsets
  G0 Z{saved_z_coord} F6000
  # Transfer the print fan speed to the active tool head
  {% if last_tool|int >= 0 %}
    SET_FAN_SPEED FAN="part_fan_t{tool_number}" SPEED={fan_speed}
  {% endif %}
  # Update toolhead lights if applicable
  {% if printer["gcode_macro _sb_vars"] is defined %}
    {% if printer.idle_timeout.state != "Printing" %}
      STATUS_BUSY
    {% else %}
      STATUS_PRINTING
    {% endif %}
  {% endif %}
  # Update the current tool variable in the save file
  SAVE_VARIABLE VARIABLE=current_tool VALUE={tool_number}

[gcode_macro _CRASH_DETECTION]
variable_tool_change: False
gcode:
    {% set active_tool = printer.toolchanger.tool_number|int %}
    {% set calling_tool = params.TOOL|int %}
    {% if calling_tool == active_tool and tool_change == False %}
        RESPOND TYPE=error MSG='Tool not detected, expected {printer.toolchanger.tool_number}. Pausing the print.'
        PAUSE
    {% endif %} 

[gcode_macro DUMP_VARIABLES]
gcode:
    {% set filter_name = params.NAME|default('')|string|lower %}
    {% set filter_value = params.VALUE|default('')|string|lower %}
    {% set show_cfg = params.SHOW_CFG|default(0)|int %}
    
    {% set out = [] %}

    {% for key1 in printer %}
        {% for key2 in printer[key1] %}
            {% if (show_cfg or not (key1|lower == 'configfile' and key2|lower in ['config', 'settings'])) and (filter_name in key1|lower or filter_name in key2|lower) and filter_value in printer[key1][key2]|string|lower %}
                {% set dummy = out.append("printer['%s'].%s = %s" % (key1, key2, printer[key1][key2])) %}
            {% endif %}
        {% else %}
            {% if filter_name in key1|lower and filter_value in printer[key1]|string|lower %}
                {% set dummy = out.append("printer['%s'] = %s" % (key1, printer[key1])) %}
            {% endif %}
        {% endfor %}
    {% endfor %}
    
    {action_respond_info(out|join("\n"))}


[gcode_macro _MOVE_TO_CENTER]
description: Moves the toolhead to the center of the bed at a safe Z height.
gcode:
    G90                     ; Absolute positioning
    G0 Z10 F600             ; Move to safe Z height
    G0 X150 Y150 F6000      ; Move to bed center
    G0 Z10 F600             ; Move back to a safe height (for safety)

[gcode_macro CARTO_OFFSET_PROBE]
description: Probes the specified tool (T0, T1, T2, etc.) and saves the raw Z height.
gcode:
    {% set TOOL_NUM = params.T|int %}
    {% set HEATER_NAME = "" %}
    {% set TOOL_KEY = 't' ~ TOOL_NUM|string %}

    {% if TOOL_NUM == 0 %}
        {% set HEATER_NAME = "extruder" %}
    {% elif TOOL_NUM == 1 %}
        {% set HEATER_NAME = "extruder1" %}
    {% elif TOOL_NUM == 2 %}
        {% set HEATER_NAME = "extruder2" %}
    {% elif TOOL_NUM == 3 %}
        {% set HEATER_NAME = "extruder3" %}
    {% else %}
        RESPOND TYPE=error MSG="Tool T{TOOL_NUM} is not handled in this macro."
    {% endif %}
    
    RESPOND TYPE=command MSG="--- Starting probe for Tool T{TOOL_NUM} ---"

    # 1. Probing Sequence
    SELECT_TOOL T={TOOL_NUM}
    G90
    G0 Z10 F600
    
    # Use blocking M109
     M104 T{TOOL_NUM} S140
    _WAIT_FOR_TEMP_WITHIN_TOLERANCE HEATER={HEATER_NAME} TOLERANCE=3
    
    G0 X150 Y150 F6000
    CARTOGRAPHER_TOUCH_PROBE

    M104 S0
    DETACH
    
[gcode_macro CARTO_SAVE_RAW]
gcode:
    {% set TOOL_NUM = params.T|int %}
    {% set HEATER_NAME = "" %}
    {% set TOOL_KEY = 't' ~ TOOL_NUM|string %}

    {% if TOOL_NUM == 0 %}
        {% set HEATER_NAME = "extruder" %}
    {% elif TOOL_NUM == 1 %}
        {% set HEATER_NAME = "extruder1" %}
    {% elif TOOL_NUM == 2 %}
        {% set HEATER_NAME = "extruder2" %}
    {% elif TOOL_NUM == 3 %}
        {% set HEATER_NAME = "extruder3" %}
    {% else %}
        RESPOND TYPE=error MSG="Tool T{TOOL_NUM} is not handled in this macro."
    {% endif %}
    
 {% set z_result = printer.cartographer.touch.last_z_result %}
    
    # 3. Cleanup and Reporting
    M104 S0 ; Turn off heater
    
    {% if z_result is not none and z_result != 0.0 %}
        # Save the RAW Z result for later calculation
        SAVE_VARIABLE VARIABLE={TOOL_KEY + '_raw_z'} VALUE={z_result}
        RESPOND TYPE=command MSG="T{TOOL_NUM} RAW Z height saved: {z_result|round(4)}. You can now proceed to the next tool."
    {% else %}
        # Save a fail-safe value
        SAVE_VARIABLE VARIABLE={TOOL_KEY + '_raw_z'} VALUE=9999.0 
        RESPOND TYPE=error MSG="Touch failed for tool T{TOOL_NUM} or returned 0.0. Raw Z height was not saved."
  {% endif %}

[gcode_macro CARTO_CALCULATE_OFFSETS]
description: Calculates the final Z-offsets based on the raw probe data saved in the config.
gcode:
    {% set tools = printer.toolchanger.tool_numbers %}
    {% set t0_raw_z = printer.save_variables.variables['t0_raw_z']|default(0.0)|float %}
    
    {% if t0_raw_z == 0.0 or t0_raw_z == 9999.0 %}
        RESPOND TYPE=error MSG="T0 raw Z reference is invalid or missing. Cannot calculate offsets."
    {% else %}
        
        # T0 must always have an offset of 0.0
        SAVE_VARIABLE VARIABLE='t0_offset_z' VALUE=0.0
        RESPOND TYPE=command MSG="T0 offset saved as 0.0 (Reference: {t0_raw_z|round(4)})"

        {% for tool_num in tools %}
            {% if tool_num != 0 %}
                {% set raw_z_var = 't' + tool_num|string + '_raw_z' %}
                {% set current_raw_z = printer.save_variables.variables[raw_z_var]|default(0.0)|float %}

                {% if current_raw_z != 0.0 and current_raw_z != 9999.0 %}
                    # Calculation: T0_Z - Current_Tool_Z
                    {% set z_offset = current_raw_z - t0_raw_z %}
                    #{% set z_offset = t0_raw_z - current_raw_z %}
                    
                    SAVE_VARIABLE VARIABLE={'t' + tool_num|string + '_offset_z'} VALUE={z_offset}
                    RESPOND TYPE=command MSG="T{tool_num} raw Z: {current_raw_z|round(4)}. Calculated final offset: {z_offset|round(4)}"
                {% else %}
                    RESPOND TYPE=error MSG="T{tool_num} raw Z data missing or invalid. Offset calculation skipped."
                {% endif %}
            {% endif %}
        {% endfor %}
        
        RESPOND TYPE=command MSG="Calculation complete. Results written to offset_save_file.cfg."
    {% endif %}

[gcode_macro CARTO_CALIBRATE_Z_OFFSETS]
gcode:
     CARTO_OFFSET_PROBE T=0
     CARTO_SAVE_RAW T=0
     CARTO_OFFSET_PROBE T=1
     CARTO_SAVE_RAW T=1
     CARTO_OFFSET_PROBE T=2
     CARTO_SAVE_RAW T=2
     CARTO_OFFSET_PROBE T=3
     CARTO_SAVE_RAW T=3
     CARTO_CALCULATE_OFFSETS

[gcode_macro CHECK_APPLIED]
gcode:
  RESPOND MSG="Applied X: {printer.gcode_move.homing_origin.x}"
  RESPOND MSG="Applied Y: {printer.gcode_move.homing_origin.y}"
  RESPOND MSG="Applied Z: {printer.gcode_move.homing_origin.z}"

[gcode_macro PRIME_LINES]
description: Prime all active tools before printing.
  INITIAL_TOOL= Tool number, optional.
variable_tools_per_x:          6      # Number of tools primed in a single row
variable_lines_per_tool:       4      # Number of prime lines per tool
variable_line_step_y:          2      # Distance between lines in Y axis
variable_spacing:              7      # Distance between each tools prime lines
variable_ratio:                4      # Distance to move per 1mm of extrusion
variable_x_neg_offset:         30      # Distance from Edge of the bed on the -X axis
variable_x_pos_offset:         5      # Distance from Edge of the bed on the +X axis
variable_y_offset:             60     # Distance from Edge of the bed on the -Y axis (avoid toolheads at Y=70)
variable_pre_prime:            8      # Amount of extrude to do before starting prime line
variable_wipe_length:          6      # Wipe length after prime
variable_initial_tool_retract: 0.2    # Retraction distance for the initial tool (if defined) after prime
variable_docked_tool_retract:  0.3    # Retraction distance for docked tools after prime
variable_z_prime_pos:          0.3    # Distance from bed on Z axis while priming
variable_z_move_pos:           3     # Distance from bed on Z axis while moving (must clear parked toolheads)
variable_move_speed:           10000  # Travel move speed
variable_prime_speed:          1000   # Prime move speed
variable_wipe_speed:           3000   # Wipe move speed

gcode:
  {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
  {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
  {% set line_length = (max_x-(x_neg_offset+x_pos_offset)-(spacing*(tools_per_x-1)))/tools_per_x %}
  {% set print_tools = [] %}

  # Figure out the required tools by which tools are preheating
  {% for tn in printer.toolchanger.tool_numbers %}
    {% set extruder_id = "extruder" + tn|string if tn > 0 else "extruder" %}

    {% if printer[extruder_id].target >= printer.configfile.settings[extruder_id].min_extrude_temp %}
      {% set gengar = print_tools.append(tn) %}
    {% endif %}
  {% endfor %}

  # Make sure the initial print tool is the last to prime
  {% if params.INITIAL_TOOL is defined %}
    {% set initial_tool = params.INITIAL_TOOL|int %}

    {% if print_tools|length > 1 %}
      {% set snorlax   = print_tools.pop(print_tools.index(initial_tool)) %}
      {% set lickitung = print_tools.append(initial_tool) %}
    {% endif %}
  
    {% if printer.toolchanger.tool_number != initial_tool and printer.toolchanger.tool_number != print_tools[0] and printer.toolchanger.tool_number in print_tools %}
      {% set mimikyu = print_tools.pop(print_tools.index(printer.toolchanger.tool_number)) %}
      {% set bulbasaur = print_tools.insert(0, printer.toolchanger.tool_number) %}
    {% endif %}

    {% else %}
      {% set initial_tool = None %}
  {% endif %}
  
  {% for tn in print_tools %}
    # Change tool
    T{tn}

    {% set extruder_id = "extruder" + tn|string if tn > 0 else "extruder" %}
    {% set t_idx = print_tools.index(tn) %}
    {% set y_idx = (t_idx/tools_per_x)|int %}
    {% set x_tool_list = print_tools[y_idx*tools_per_x:] %}
    {% set x_idx = x_tool_list.index(tn) %}
    {% set prime_start_x = x_neg_offset + (x_idx*line_length) + (x_idx*spacing) %}
    {% set prime_start_y = y_offset + (line_step_y*(lines_per_tool-1)) + (y_idx*spacing) %}

    # Move to position
    G0 X{prime_start_x} Y{prime_start_y} Z{z_move_pos} F{move_speed}
    G0 Z{z_prime_pos} F{move_speed}

    # Wait for temp
    M109 S{printer[extruder_id].target} T{tn}

    # Prime Tool
    M117 Priming T{tn}
    M83
    G92 E0
    G91
    G1 E{pre_prime} F{prime_speed}
    
    {% for i in range(lines_per_tool) %}
      {% set last_line = i == lines_per_tool-1 %}
      {% set segment = ((line_length/ratio)-2)|int if last_line else ((line_length/ratio)+1)|int %}
      
      {% if i % 2 == 0 %}
        {% for _i in range(1, segment) %}
          G1 X{ratio} E1 F{prime_speed}
        {% endfor %}
      {% else %}
        {% for _i in range(1, segment) %}
          G1 X-{ratio} E1 F{prime_speed}
        {% endfor %}
      {% endif %}
  
      {% if not last_line %}
        G1 Y-{line_step_y} E{(line_step_y/ratio)*1} F{move_speed}
      {% endif %}
    {% endfor %}

    G1 E-{initial_tool_retract if tn == initial_tool else docked_tool_retract} F{wipe_speed}
    G0 X{-0.5 if lines_per_tool % 2 == 0 else 0.5} F{wipe_speed}
    G0 X{wipe_length-0.5 if lines_per_tool % 2 == 0 else -(wipe_length-0.5)} F{wipe_speed}
    G0 Z{z_move_pos}

  G90

  {% endfor %}
  
  # Note: RESTORE_GCODE_STATE removed - interferes with toolchanger dock positions

