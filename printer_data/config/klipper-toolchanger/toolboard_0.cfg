max_temp: 115

#####################################################################
#   gcode_macro T0
#####################################################################
#[gcode_macro T0]
#variable_color: ""
#variable_tool_number: 0
#gcode:
#  _CHANGE_TOOL T={tool_number}
  
[gcode_macro T0]
variable_color: ""
variable_tool_number: 0
variable_spool_id: None
gcode:
  _CHANGE_TOOL T={tool_number}
  {% if spool_id != None %}
    SET_ACTIVE_SPOOL ID={spool_id}
  {% endif %}
  
[tool T0]
tool_number: 0
extruder: extruder
fan: part_fan_t0
gcode_x_offset: 0
gcode_y_offset: 0
gcode_z_offset: 0
# Position with the toolhead aligned with the dock
params_park_x: 20
params_detach_x: 30
params_input_shaper_type_x: 'mzv'
params_input_shaper_freq_x: 60.4
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_y: 45.6

