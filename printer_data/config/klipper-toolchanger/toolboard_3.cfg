# This file contains common pin mappings for the BigTreeTech EBB36 V1.2
# when setup for T0 on Tridex
#####################################################################
#   Extruder
#####################################################################

[extruder3]
step_pin: toolboard_3:gpio23
dir_pin: toolboard_3:gpio24
enable_pin: !toolboard_3:gpio25
rotation_distance: 22.28207
gear_ratio: 50:10
microsteps: 16
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_cross_section: 50
max_extrude_only_distance: 400

#####################################################################
#   Heater
#####################################################################

heater_pin: toolboard_3:gpio9
sensor_type: PT1000
sensor_pin: toolboard_3:gpio29
pullup_resistor: 2200
min_temp: 0
max_temp: 370
max_power: 1.0
min_extrude_temp: 170
#control: pid
#pid_kp: 22.411
#pid_ki: 0.799
#pid_kd: 157.158
##--------------------------------------------------------------------
## Pressure Advance
pressure_advance: 0.025             # Try to keep pressure_advance below 1.0
pressure_advance_smooth_time: 0.030 # Default is 0.040, leave stock
##--------------------------------------------------------------------

##--------------------------------------------------------------------
## Verify Heater - Lenient settings for slower heating
[verify_heater extruder3]
max_error: 200
check_gain_time: 120
hysteresis: 10
heating_gain: 1
##--------------------------------------------------------------------


##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 extruder3]
sense_resistor: 0.100
uart_pin: toolboard_3:gpio0
tx_pin: toolboard_3:gpio1
interpolate: true
run_current: 0.65
hold_current: 0.35

#####################################################################
#   Fan Control
#####################################################################

[fan_generic part_fan_t3]
##  Print Cooling Fan
pin: toolboard_3:gpio6
kick_start_time: 0.3
off_below: 0.05

## Hotend fan
[heater_fan hotend_fan3]
pin: toolboard_3:gpio5
hardware_pwm: False
shutdown_speed: 0.0
tachometer_pin: ^toolboard_3:gpio16
tachometer_ppr: 1
max_power: .85
kick_start_time: 0.5
heater: extruder3
heater_temp: 78.0
##  If you are experiencing back flow, you can reduce fan_speed
#fan_speed: 1.0
cycle_time: 0.0001
tachometer_poll_interval: 0.00015

