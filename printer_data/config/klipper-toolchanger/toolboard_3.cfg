#####################################################################
#   Temperature Sensor
#####################################################################

[temperature_sensor toolboard_3]
sensor_type: temperature_mcu
sensor_mcu: toolboard_3
min_temp: 0
max_temp: 115
#####################################################################
#   gcode_macro T1
#####################################################################
[gcode_macro T3]
variable_color: ""
variable_tool_number: 3
variable_spool_id: None
gcode:
  _CHANGE_TOOL T={tool_number}
  {% if spool_id != None %}
    SET_ACTIVE_SPOOL ID={spool_id}
  {% endif %}
  
[tool T3]
tool_number: 3
extruder: extruder3
fan: part_fan_t3
gcode_x_offset: 0
gcode_y_offset: 0
gcode_z_offset: 0
# Position with the toolhead aligned with the dock
params_park_x: 292
params_detach_x: 282
params_input_shaper_type_x: 'mzv'
params_input_shaper_freq_x: 60.4
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_y: 45.6

