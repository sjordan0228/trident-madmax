## X Stepper on Motor1(B Motor)
[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 16
rotation_distance: 40
#full_steps_per_rotation:200  
endstop_pin: PF4
position_min: 0
position_endstop: 342
position_max: 342


homing_speed: 40  
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC13
interpolate: True
run_current: 0.8
#stealthchop_threshold: 0

## Y Stepper on Motor2 (A Motor)
[stepper_y]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 16
rotation_distance: 40
#full_steps_per_rotation:200  
endstop_pin: ^PF3
position_min: -5
position_endstop: 350
position_max: 350

homing_speed: 50  
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PE3
interpolate: True
run_current: 0.8
#stealthchop_threshold: 0

