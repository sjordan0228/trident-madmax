[force_move]
enable_force_move: True

[AFC_extruder extruder]
pin_tool_start: buffer
tool_stn: 60
tool_stn_unload: 65
tool_sensor_after_extruder: 1
tool_unload_speed: 25
tool_load_speed: 25
buffer: T0_buffer
tool: tool T0
deadband: 10
toolchanger_unit: Tools

#[filament_switch_sensor bypass]
#switch_pin: turtleneck:PB5
#pause_on_runout: False

