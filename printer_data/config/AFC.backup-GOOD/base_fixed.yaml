# Note: We use esp-idf framework as it compiles reliably on ESPHome 2026.x
esp32:
  variant: esp32s3
  framework:
    type: esp-idf

# Enable serial logging for debugging
logger:

# Enable Home Assistant API for OTA updates and device management
api:

# Enable over-the-air updates — after first USB flash, all updates are wireless
ota:
  - platform: esphome

# Captive portal serves the WiFi config page when in fallback hotspot mode
captive_portal:

# inherits the correct colour when activated
globals:
  - id: current_r
    type: float
    initial_value: '0.0'
  - id: current_g
    type: float
    initial_value: '0.0'
  - id: current_b
    type: float
    initial_value: '0.0'

# Topics use ${toolhead_id} substitution so each toolhead gets its own namespace
mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  on_message:
    # Colour topic — handles success (hex colour), error (unknown tag), and off states
    - topic: "nfc/toolhead/${toolhead_id}/color"
      then:
        - if:
            condition:
              lambda: 'return x == "error";'
            then:
              # Flash red 3 times to indicate unknown/unregistered tag
              - light.turn_on:
                  id: status_led
                  red: 1.0
                  green: 0.0
                  blue: 0.0
                  brightness: 100%
                  effect: none
              - delay: 200ms
              - light.turn_off:
                  id: status_led
              - delay: 150ms
              - light.turn_on:
                  id: status_led
                  red: 1.0
                  green: 0.0
                  blue: 0.0
                  brightness: 100%
              - delay: 200ms
              - light.turn_off:
                  id: status_led
              - delay: 150ms
              - light.turn_on:
                  id: status_led
                  red: 1.0
                  green: 0.0
                  blue: 0.0
                  brightness: 100%
              - delay: 200ms
              - light.turn_off:
                  id: status_led
            else:
              - lambda: |-
                  std::string hex = x;
                  if (hex.length() == 6) {
                    int r = stoi(hex.substr(0, 2), nullptr, 16);
                    int g = stoi(hex.substr(2, 2), nullptr, 16);
                    int b = stoi(hex.substr(4, 2), nullptr, 16);
                    // Store RGB globally so low spool effect inherits the correct colour
                    id(current_r) = r / 255.0;
                    id(current_g) = g / 255.0;
                    id(current_b) = b / 255.0;
                    // Set the LED to the filament colour, clearing any active effect
                    auto call = id(status_led).turn_on();
                    call.set_effect("none");
                    call.set_rgb(r / 255.0, g / 255.0, b / 255.0);
                    call.set_transition_length(0);
                    call.perform();
                  } else if (hex == "000000") {
                    id(status_led).turn_off().perform();
                  }
    # Low spool topic — activates breathing effect when spool is at or below threshold
    - topic: "nfc/toolhead/${toolhead_id}/low_spool"
      then:
        - if:
            condition:
              lambda: 'return x == "true";'
            then:
              # Start breathing effect — pulses the current filament colour
              - light.turn_on:
                  id: status_led
                  red: !lambda 'return id(current_r);'
                  green: !lambda 'return id(current_g);'
                  blue: !lambda 'return id(current_b);'
                  effect: "Low Spool Warning"
            else:
              # Clear breathing effect — restore solid colour
              - light.turn_on:
                  id: status_led
                  effect: none

# Slow frequency (10000 Hz) improves reliability with the PN532
i2c:
  sda: GPIO1
  scl: GPIO2
  frequency: 10000
  scan: true  # Logs detected I2C devices on boot — useful for debugging

# rgb_order: RGB is correct for this board
light:
  - platform: esp32_rmt_led_strip
    chipset: WS2812
    rgb_order: RGB
    pin: GPIO21
    num_leds: 1
    name: "${friendly_name} Status LED"
    id: status_led
    effects:
      # Breathing effect for low spool warning — pulses between 10% and 80% brightness
      # Uses the current LED colour (filament colour) so it stays visually meaningful
      - pulse:
          name: "Low Spool Warning"
          transition_length: 1s
          update_interval: 1s
          min_brightness: 10%
          max_brightness: 80%

# PN532 NFC reader configuration
pn532_i2c:
  id: pn532_board
  on_tag:
    # Triggered every time an NFC tag is brought near the reader
    then:
      # 1. Publish the UID and toolhead identifier to MQTT IMMEDIATELY
      # This allows the middleware to start the lookup while the LED is flashing white.
      - mqtt.publish:
          topic: "nfc/toolhead/${toolhead_id}"
          payload: !lambda |-
            return "{\"uid\": \"" + x + "\", \"toolhead\": \"${toolhead_id}\"}";

      # 2. Log the tag UID to the serial console for debugging
      - logger.log:
          format: "Tag scanned on ${toolhead_id}: %s"
          args: [x.c_str()]

      # 3. Flash white 3 times to indicate a successful scan
      - light.turn_on:
          id: status_led
          red: 1.0
          green: 1.0
          blue: 1.0
          brightness: 100%
      - delay: 150ms
      - light.turn_off:
          id: status_led
      - delay: 100ms
      - light.turn_on:
          id: status_led
          red: 1.0
          green: 1.0
          blue: 1.0
          brightness: 100%
      - delay: 150ms
      - light.turn_off:
          id: status_led
      - delay: 100ms
      - light.turn_on:
          id: status_led
          red: 1.0
          green: 1.0
          blue: 1.0
          brightness: 100%
      - delay: 150ms
      - light.turn_off:
          id: status_led
