# SpoolSense Klipper Macros
# Add this to your printer.cfg:  [include spoolsense.cfg]

# Assign a scanned spool to a specific tool without physical pickup.
# Usage: ASSIGN_SPOOL TOOL=T5
# Scan a tag first, then run this macro — the spool data is assigned
# to the specified tool automatically.
[gcode_macro ASSIGN_SPOOL]
variable_pending_tool: ""
gcode:
  SET_GCODE_VARIABLE MACRO=ASSIGN_SPOOL VARIABLE=pending_tool VALUE="'{params.TOOL}'"
